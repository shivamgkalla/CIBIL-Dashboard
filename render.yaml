databases:
  - name: cibil-db
    plan: free
    databaseName: cibil_dashboard
    user: cibil_user

services:
  - type: web
    name: cibil-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cibil-db
          property: connectionURI
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ORIGINS
        value: '["http://localhost:3000"]'
      - key: RESET_LINK_BASE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.3"
